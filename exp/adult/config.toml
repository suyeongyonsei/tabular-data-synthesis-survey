parent_dir = "/content/drive/MyDrive/ITRC/tab-ddpm/exp/adult/check"
real_data_path = "/content/drive/MyDrive/ITRC/tab-ddpm/data/adult/"
num_numerical_features = 5
model_type = "mlp"
device = "cuda:0"

[model_params]
num_classes = 2
is_y_cond = true

[model_params.rtdl_params]
d_layers = [
    256,
    256
]
dropout = 0.0

[diffusion_params]
num_timesteps = 1000 #이거 바꿈
gaussian_loss_type = "mse"
scheduler = "cosine"

[train.main]
steps = 20000
lr = 0.001
weight_decay = 1e-05
batch_size = 4096

[train.T]
normalization = "quantile"
num_nan_policy = "__none__"
cat_nan_policy = "__none__"
cat_min_frequency = "__none__"
cat_encoding = "__none__"
y_policy = "default"

[sample]
num_samples = 32561
batch_size = 10000


[eval.type]
eval_model = "catboost"
eval_type = "synthetic"

[eval.T]
seed = 0
normalization = "__none__"
num_nan_policy = "__none__"
cat_nan_policy = "__none__"
cat_min_frequency = "__none__"
cat_encoding = "__none__"
y_policy = "default"
